version: '4'

services:
  gestion-gastos:
    build: backend/
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:mysql://finance-app:3306/finance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USER_NAME: root
      DB_PASSWORD: 1234
      SECRET_KEY: "c2VjcmV0LWtlLWZpbmFuY2UtYXBwLTIwMjQtc2VjdXJpdHk="
    restart: always
    depends_on:
      finance-app:
        condition: service_healthy
  finance-app:
    image: mysql:8.0.33
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_PASSWORD: 1234
      MYSQL_DATABASE: finance_db
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 10s
      retries: 10
