# ============================================================
#  CONFIGURACIÓN BASE - Spring Boot Finance App
# ============================================================

spring.application.name=gestion-gastos
server.port=8080

# ============================================================
#  BASE DE DATOS — H2 IN-MEMORY (perfil por defecto: dev)
#  Para usar MySQL: ver sección comentada debajo
# ============================================================
# spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Consola web H2 (solo desarrollo)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ============================================================
#  JPA / HIBERNATE
# ============================================================

# update: crea tablas si no existen, aplica cambios incrementales.
# Opciones: create | create-drop | update | validate | none
# spring.jpa.hibernate.ddl-auto=update

# Dialecto explícito (recomendado para evitar deprecation warnings)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Mostrar SQL generado por Hibernate (útil en desarrollo)
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# Nombrado de tablas y columnas en snake_case automáticamente
# spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ============================================================
#  LOGGING
# ============================================================
logging.level.com.example.app=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ============================================================
#  CONFIGURACIÓN MYSQL (descomentar para producción)
#  Requiere agregar al pom.xml:
#    <dependency>
#      <groupId>com.mysql</groupId>
#      <artifactId>mysql-connector-j</artifactId>
#    </dependency>
#  Y comentar/eliminar la sección H2 de arriba.
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.h2.console.enabled=false

# ===========================
# JWT
# ===========================
# Secret de al menos 32 caracteres (256 bits) — cambiar en produccion
app.jwt.secret=${SECRET_KEY}
# Expiracion en milisegundos: 86400000 = 24 horas
app.jwt.expiration=86400000
app.jwt.token-prefix=Bearer
app.jwt.header-name=Authorization
